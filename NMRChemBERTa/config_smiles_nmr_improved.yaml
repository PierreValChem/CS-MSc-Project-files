# config_smiles_nmr_improved.yaml - Optimized for better accuracy

model:
  chemberta_name: "DeepChem/ChemBERTa-77M-MLM"
  hidden_dim: 768  # Increased from 384
  num_atom_types: 10
  max_atoms: 200
  max_seq_length: 512
  dropout: 0.1  # Increased for regularization
  num_attention_heads: 12  # Increased from 6
  freeze_chemberta: false  # Allow fine-tuning
  nmr_hidden_dim: 512  # Increased from 256
  nmr_num_layers: 6  # Increased from 3

data:
  data_directory: "CSV_to_NMRe_output_v3/"
  batch_size: 16  # Smaller batch for more stable gradients
  train_split: 0.85  # More training data
  val_split: 0.10
  test_split: 0.05
  num_workers: 4
  pin_memory: true
  max_files_limit: null  # Use ALL data

training:
  learning_rate: 1.0e-5  # Lower initial learning rate
  weight_decay: 1.0e-5  # Increased regularization
  num_epochs: 300  # Allow more epochs (early stopping will prevent overfitting)
  warmup_steps: 3000  # Longer warmup
  gradient_clip_norm: 0.5  # More aggressive clipping
  accumulation_steps: 8  # Effective batch size = 16 * 4 = 64
  save_every_n_epochs: 10
  validate_every_n_steps: 100
  early_stopping_patience: 30  # More patience
  scheduler_patience: 10  # More patience before reducing LR
  use_amp: true  # Enable mixed precision if GPU supports it
  
  # NMR loss configuration
  nmr_loss_weight: 1.0
  nmr_loss_type: "huber"  # Robust to outliers
  nmr_loss_reduction: "weighted"
  use_nmr_attention_loss: true
  
  # Disable other tasks
  position_loss_weight: 0.0
  atom_type_loss_weight: 0.0
  smiles_position_loss_weight: 0.0

hardware:
  device: "cuda"
  mixed_precision: true
  compile_model: false
  use_distributed: false
  gradient_checkpointing: true
  channels_last: false

logging:
  log_level: "INFO"
  use_wandb: false
  use_tensorboard: true
  log_dir: "./logs_smiles_nmr_improved"
  checkpoint_dir: "./checkpoints_smiles_nmr_improved"
  experiment_name: "smiles_nmr_correlation_improved"
  plot_every_n_epochs: 10