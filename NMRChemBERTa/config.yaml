# NMR-ChemBERTa Configuration File

model:
  chemberta_name: "DeepChem/ChemBERTa-77M-MLM"
  hidden_dim: 384
  num_atom_types: 10
  max_atoms: 200
  max_seq_length: 512
  dropout: 0.1
  num_attention_heads: 6
  freeze_chemberta: true
  nmr_hidden_dim: 256
  nmr_num_layers: 3

data:
  data_directory: "CSV_to_NMRe_output_v3/"
  batch_size: 16
  train_split: 0.7    # CHANGE from 0.8
  val_split: 0.2      # CHANGE from 0.1
  test_split: 0.1 
  num_workers: 4
  pin_memory: true
  max_files_limit: null  # Set to null for no limit

training:
  learning_rate: 1.0e-5
  weight_decay: 1.0e-5
  num_epochs: 1000
  warmup_steps: 1000
  gradient_clip_norm: 1.0
  accumulation_steps: 1
  save_every_n_epochs: 5
  validate_every_n_steps: 100
  early_stopping_patience: 10
  scheduler_patience: 5
  use_amp: false 
  
  # Loss weights
  nmr_loss_weight: 2.0  # CHANGE from 1.0
  nmr_loss_type: "huber"  # ADD THIS
  nmr_loss_reduction: "weighted"  # ADD THIS
  use_nmr_attention_loss: true  # ADD THIS
  position_loss_weight: 1.0
  atom_type_loss_weight: 1.0
  smiles_position_loss_weight: 0.5

hardware:
  device: "auto"  # auto, cpu, cuda, mps
  mixed_precision: true
  compile_model: true
  use_distributed: false
  gradient_checkpointing: false
  channels_last: true

logging:
  log_level: "INFO"
  use_wandb: false
  use_tensorboard: true
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"
  experiment_name: "nmr_chemberta_experiment"
  plot_every_n_epochs: 5